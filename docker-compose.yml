version: '3.8'

services:
  # Existing Services
  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /opt/credentials.json
      GCP_PROJECT_ID: dezoomcampproject-493714
    volumes:
      - ./google_credentials.json:/opt/credentials.json
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  # =========================
  # POSTGRES (Airflow Metadata DB)
  # =========================
  airflow-postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U airflow" ]
      interval: 5s
      retries: 10

  # =========================
  # AIRFLOW INIT
  # =========================
  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    depends_on:
      - airflow-postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username airflow --password airflow --firstname Airflow --lastname Admin --role Admin --email admin@example.com &&
      airflow connections add 'google_cloud_default' --conn-type 'google_cloud_platform' --conn-extra '{\"key_path\": \"/opt/airflow/google_credentials.json\", \"project\": \"dezoomcampproject-493714\"}'"

  # =========================
  # AIRFLOW WEBSERVER
  # =========================
  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    restart: always
    depends_on:
      - airflow-init
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY}
      GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/google_credentials.json
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
      DBT_PROFILES_DIR: /opt/airflow/transformation
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./ingestion:/opt/airflow/ingestion
      - ./transformation:/opt/airflow/transformation
      - ./google_credentials.json:/opt/airflow/google_credentials.json
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    command: webserver

  # =========================
  # AIRFLOW SCHEDULER
  # =========================
  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    restart: always
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY}
      GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/google_credentials.json
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
      DBT_PROFILES_DIR: /opt/airflow/transformation
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./ingestion:/opt/airflow/ingestion
      - ./transformation:/opt/airflow/transformation
      - ./google_credentials.json:/opt/airflow/google_credentials.json
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    command: scheduler
